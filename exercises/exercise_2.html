<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>04exe</title>

    <link rel="stylesheet" href="../assets/lib/normalize.css">


    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
        }

        section{
            width: 1533px;
            height: 679px;
            position: relative;
        }

        div{
            width: 50px;
            height: 50px;
            border: #6c2eff solid 2px;


            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            margin: auto;

            border-radius: 50%;

            animation-name: waterdrop;
            animation-duration: 2000ms;
            animation-iteration-count: infinite;
            animation-direction: normal;
        }

        @keyframes waterdrop {

            0%{
                width: 10px;
                height: 10px;
            }
            100%{


                width: 300px;
                height: 300px;
                opacity: 0.1%;
            }

        }


    </style>
</head>
<body>
    <section>
        <div></div>
    </section>
</body>
</html>
